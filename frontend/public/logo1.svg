  <!-- Left swash arm -->
  <path d="M25 94.5 C18.5 92 12 88 8 82" stroke="#C9A96E" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M8 82 C9.5 84.5 13 85 17 83.5" stroke="#C9A96E" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M8 82 C6.5 79 7.5 76 10.5 75" stroke="#C9A96E" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Right swash arm -->
