  <rect x="17.5" y="30" width="5" height="1.4" fill="#C9A96E" opacity="0.55"/>
  <rect x="57.5" y="30" width="5" height="1.4" fill="#C9A96E" opacity="0.55"/>

  <!-- ── VERTICAL STEM ──────────────────────────────────────────────────── -->
  <rect x="36.5" y="32.2" width="7" height="45.6" fill="#C9A96E"/>

  <!-- ── MID DECORATIVE SCROLLWORK ─────────────────────────────────────── -->
  <!-- Left scroll -->
  <path d="M36.5 55 C30 51.5 22 53 20 57.5 C22 62 30 61 36.5 57.5" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.45"/>
  <!-- Right scroll -->
  <path d="M43.5 55 C50 51.5 58 53 60 57.5 C58 62 50 61 43.5 57.5" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.45"/>
  <!-- Diamond ornament left -->
  <rect x="14" y="54.5" width="4.5" height="4.5" transform="rotate(45 16.25 56.75)" fill="#C9A96E" opacity="0.3"/>
  <!-- Diamond ornament right -->
  <rect x="61.5" y="54.5" width="4.5" height="4.5" transform="rotate(45 63.75 56.75)" fill="#C9A96E" opacity="0.3"/>

  <!-- ── BOTTOM SERIF CROSSBAR ──────────────────────────────────────────── -->
