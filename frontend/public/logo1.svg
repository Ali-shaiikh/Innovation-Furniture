  <path d="M8 28 C9.5 25.5 13 25 17 26.5" stroke="#C9A96E" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M8 28 C6.5 31 7.5 34 10.5 35" stroke="#C9A96E" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.35"/>

