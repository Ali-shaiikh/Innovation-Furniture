  <path d="M72 82 C70.5 84.5 67 85 63 83.5" stroke="#C9A96E" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M72 82 C73.5 79 72.5 76 69.5 75" stroke="#C9A96E" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Central petal (inverted) -->
