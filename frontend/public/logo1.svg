  <!-- Outer serif wings -->
  <rect x="17.5" y="78.6" width="5" height="1.4" fill="#C9A96E" opacity="0.55"/>
  <rect x="57.5" y="78.6" width="5" height="1.4" fill="#C9A96E" opacity="0.55"/>

